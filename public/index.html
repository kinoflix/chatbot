<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOFLIX AI - Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white font-sans h-screen relative overflow-hidden">

    <div class="p-8">
        <h1 class="text-4xl font-bold text-indigo-500">KINOFLIX LAYİHƏSİ</h1>
        <p class="text-gray-400 mt-2">Film və video platformasına xoş gəlmisiniz.</p>
    </div>

    <button id="toggle-bot-btn" class="fixed left-0 top-1/2 -translate-y-1/2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-6 rounded-r-2xl shadow-2xl transition-all z-50 flex flex-col items-center gap-2 group border border-indigo-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <span class="text-xs font-bold uppercase tracking-widest [writing-mode:vertical-lr] rotate-180">KINOFLIX AI</span>
    </button>

    <div id="bot-panel" class="fixed left-0 top-0 bottom-0 w-full max-w-md h-screen glass-panel shadow-2xl flex flex-col overflow-hidden bg-slate-900/90 z-50 transition-all duration-500 transform -translate-x-full border-r border-white/10">
        
        <div class="px-6 py-5 flex items-center justify-between border-b border-white/10 bg-slate-950/50">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-11 h-11 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl rotate-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
                        </svg>
                    </div>
                    <span class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-green-500 border-2 border-slate-900 rounded-full animate-pulse"></span>
                </div>
                <div>
                    <h1 class="font-bold text-white text-lg tracking-tight">KINOFLIX AI</h1>
                    <p class="text-[10px] font-semibold text-indigo-400 uppercase tracking-widest">Online Assistant</p>
                </div>
            </div>

            <div class="flex items-center gap-1">
                <button id="clearBtn" class="p-2 rounded-xl bg-red-900/20 text-red-400 hover:scale-110 transition-all" title="Çatı təmizlə">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
                <button id="close-bot-btn" class="p-2 rounded-xl bg-white/5 text-gray-300 hover:scale-110 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-transparent">
            </div>

        <div id="typing-indicator" class="px-8 py-2 hidden">
            <div class="flex items-center gap-1.5 opacity-70">
                <span class="typing-dot"></span>
                <span class="typing-dot" style="animation-delay: 0.2s"></span>
                <span class="typing-dot" style="animation-delay: 0.4s"></span>
                <span class="text-xs font-medium text-gray-400 ml-2">KINOFLIX cavab hazırlayır...</span>
            </div>
        </div>

        <div class="p-5 bg-slate-800/40 border-t border-white/5">
            <div class="relative">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Film və ya janr soruşun..." 
                    class="w-full pl-5 pr-14 py-3.5 bg-white/5 border border-transparent text-white text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-800 transition-all shadow-inner"
                    autocomplete="off"
                >
                <button 
                    id="sendBtn"
                    class="absolute right-2 top-2 bottom-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow-lg shadow-indigo-500/20 transition-all flex items-center justify-center"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 rotate-90" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
            
            <div class="flex gap-1.5 mt-3 overflow-x-auto pb-1 custom-scrollbar">
                <button onclick="fillInput('Hansı maraqlı fantastik filmlər var?')" class="whitespace-nowrap px-3 py-1.5 text-[11px] font-medium bg-white/5 border border-white/5 rounded-full text-gray-300 hover:bg-indigo-900/30 hover:border-indigo-500/40 transition-all">🎬 Fantastika</button>
                <button onclick="fillInput('Mənə gərgin bir detektiv film məsləhət gör')" class="whitespace-nowrap px-3 py-1.5 text-[11px] font-medium bg-white/5 border border-white/5 rounded-full text-gray-300 hover:bg-indigo-900/30 hover:border-indigo-500/40 transition-all">🔍 Detektiv</button>
                <button onclick="fillInput('Komediya janrında ən yaxşılar hansılardır?')" class="whitespace-nowrap px-3 py-1.5 text-[11px] font-semibold bg-white/5 border border-white/5 rounded-full text-gray-300 hover:bg-indigo-900/30 hover:border-indigo-500/40 transition-all">😂 Komediya</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
