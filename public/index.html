<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOFLIX AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header"><h3>Əliqoşqar AI</h3></div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Salam! Söhbətə başlayaq? 🚀</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Mesaj yazın..." autocomplete="off">
            <button id="sendBtn">Göndər</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
