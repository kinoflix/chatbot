<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINOFLIX AI - Assistent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="chat-window" class="light-mode">
    <div id="chat-header">
        <div class="header-info">
            <div class="avatar-container">
                <div class="avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
                    </svg>
                </div>
                <span class="online-dot"></span>
            </div>
            <div>
                <span class="bot-title">KINOFLIX AI</span>
                <span id="bot-status">Active System</span>
            </div>
        </div>
        <div class="header-actions">
            <button id="chat-clear-btn" title="Çatı təmizlə">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </button>
            <button id="chat-theme-btn" title="Temanı Dəyiş">
                <svg id="chat-theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-typing-indicator" class="indicator-hidden">
        <div class="typing-dots">
            <span class="typing-dot" style="animation-delay: 0s"></span>
            <span class="typing-dot" style="animation-delay: 0.2s"></span>
            <span class="typing-dot" style="animation-delay: 0.4s"></span>
            <span class="indicator-text">KINOFLIX düşünür...</span>
        </div>
    </div>

    <div id="chat-footer">
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Film və ya janr soruşun..." autocomplete="off" autofocus>
            <button id="chat-send-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="quick-chips">
            <button class="chip-btn" data-text="Hansı maraqlı fantastik filmlər var?">🚀 Fantastika</button>
            <button class="chip-btn" data-text="Mənə gərgin bir detektiv film məsləhət gör">🔍 Detektiv</button>
            <button class="chip-btn" data-text="Komediya janrında ən yaxşılar hansılardır?">😂 Komediya</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
